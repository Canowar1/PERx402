[toolchain]
anchor_version = "0.32.1"
solana_version = "2.3.13"

[features]
resolution = true
skip-lint = false

[programs.devnet]
shadow_proxy = "AVrFfzTREffC188KtCrJ2kf7AGgZFWcrzzRrYMku7k2n"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = ".wallets/proxy.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899
